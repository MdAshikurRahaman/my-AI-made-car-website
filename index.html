<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Your Car</title>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <div class="logo">Know Your Car</div>
      <ul class="nav-links">
        <li><a href="#">Search</a></li>
        <li><a href="#">Learn</a></li>
        <li><a href="#">Buy</a></li>
        <li><a href="#">Community</a></li>
      </ul>
      <div class="user-icon">
        <i class="ri-user-line"></i>
      </div>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1>Discover Your Dream Car</h1>
      <p>Search detailed specifications, performance & pricing instantly.</p>

      <div class="search-box">
        <i class="ri-search-line"></i>
        <input type="text" placeholder="Search BMW M5, GT-R, Ferrari F8...">
        <button>Search</button>
      </div>
    </div>
  </section>

  <!-- Popular Section -->
  <section class="popular">
    <h2>Popular Searches</h2>
    <div class="tags">
      <span>BMW M5</span>
      <span>Ferrari F8</span>
      <span>Porsche 911</span>
      <span>Koenigsegg</span>
      <span>Lamborghini Aventador</span>
    </div>
  </section>

  
  <!-- Footer -->
  <footer>
    <p>© 2026 Know Your Car | All Rights Reserved</p>
  </footer>

</body>
</html>
